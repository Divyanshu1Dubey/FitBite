name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Navigate to the project directory
            cd ~/FitBite
            
            # Pull the latest changes from GitHub
            git fetch --all
            git reset --hard origin/main
            git pull origin main
            
            # Go to the backend folder
            cd pos-backend
            
            # Install any new dependencies
            npm install
            
            # Restart the backend process. 
            # Note: We assume PM2 is managing the process. If you use nodemon, you should switch to pm2 for production.
            # pm2 restart all || pm2 start app.js
            
            # For this action, if you just ran it directly in a screen or tmux session, you might need to restart it manually,
            # but PM2 is the industry standard.
            pm2 restart app.js || pm2 start app.js --name "fitbite-backend"
            
            echo "Deployment to DigitalOcean Successful!"
